name: KTB Auto Crawler

on:
  schedule:
    # Chạy lúc 8h, 11h, 14h, 17h, 20h (Giờ VN)
    # Giờ VN = UTC+7 -> Giờ UTC tương ứng: 1, 4, 7, 10, 13
    - cron: '0 1,4,7,10,13 * * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công trên web Github

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Quan trọng để git commit --amend hoạt động đúng

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Crawler
        env:
          # Truyền Secret từ Github Settings vào biến môi trường
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python crawler.py
